name: Hello World
on: 
    push:
        branches: [main]
        paths-ignore:
            - ".github/workflows/*.yaml"
    pull_request:
        branches: [main]
        
    workflow_dispatch:

jobs:
  hello-job:
    runs-on: ubuntu-latest
    steps:
      - name: Say hello
        run: echo "Hello from GitHub Actions!"
  second-job:
    runs-on: windows-latest
    needs: hello-job
    steps:
     - run: echo "This job is running on ${{ runner.os }}"
